name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server-tests:
    name: Server — tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm install --no-audit --no-fund
      - name: Run tests
        run: npm test
        env:
          USE_ML: '0'
          JWT_SECRET: ci-test-secret

  client-build:
    name: Client — lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm install --no-audit --no-fund
      - name: Build (ESLint runs as part of the CRA build; CI=true fails on warnings)
        run: npm run build
        env:
          CI: 'true'

  dbt-parse:
    name: dbt — parse
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dbt + Athena adapter
        run: pip install dbt-core dbt-athena-community
      - name: Install dbt packages
        run: dbt deps
      - name: Validate project
        run: dbt parse --profiles-dir .
